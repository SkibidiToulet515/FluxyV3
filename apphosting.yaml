# Firebase App Hosting — Fluxy API (Express)
#
# IMPORTANT: In Firebase Console → App Hosting → your backend → Settings,
# set "Root directory" to the repository root:  /  or  .  (NOT "Server").
# That way the container includes Client/UGS Files for /games and /api/games.
#
# After changing root directory, push to main (or trigger a rollout).

runConfig:
  cpu: 1
  memoryMiB: 1024

scripts:
  # Hydrate Git LFS: without this, `Client/UGS Files/*.html` stay as pointer text and games break.
  # Debian/Ubuntu-based builders get git-lfs via apt; others must include git-lfs in the image.
  buildCommand: 'sh -c "if ! command -v git-lfs >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then apt-get update -qq && apt-get install -y -qq git-lfs; fi; git lfs install && git lfs pull && npm ci --prefix Server"'
  runCommand: node Server/index.js

# Keep the full monorepo tree (especially Client/UGS Files) in the runtime image.
outputFiles:
  serverApp:
    include:
      - "."

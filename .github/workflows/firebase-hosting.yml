# Full Firebase deploy on every push to `main` (after you commit and `git push`).
# Deploys: Hosting (built client), Firestore rules + indexes, Storage rules.
#
# Required secret: FIREBASE_SERVICE_ACCOUNT_FLUXYV3_PROD
# Firebase Console → Project settings → Service accounts → Generate new private key →
# GitHub repo → Settings → Secrets and variables → Actions → New repository secret (paste JSON).
#
# Note: Only `git push` to GitHub triggers this; local commits alone do not.
name: Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            Client/package-lock.json
            Server/package-lock.json

      - name: Install server deps (proxy libraries needed by client build)
        run: npm ci --prefix Server

      - name: Install and build client
        env:
          VITE_API_URL: https://flux--fluxyv3-prod.us-east4.hosted.app
          VITE_GAMES_ON_HOSTING: 'true'
        run: |
          cd Client
          npm ci
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLUXYV3_PROD }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting, Firestore, Storage
        run: |
          firebase deploy --only hosting,firestore,storage --project fluxyv3-prod --non-interactive

# Builds Client/dist (including games from UGS Files) then deploys Firebase Hosting.
# UGS files are normal git objects (not LFS) so no LFS quota is needed.
name: Deploy Firebase Hosting
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Client/package-lock.json
      - name: Install and build client
        env:
          VITE_API_URL: https://flux--fluxyv3-prod.us-east4.hosted.app
          VITE_GAMES_ON_HOSTING: 'true'
        run: |
          cd Client
          npm ci
          npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLUXYV3_PROD }}
          channelId: live
          projectId: fluxyv3-prod

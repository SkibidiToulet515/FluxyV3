# Builds Client/dist (not in git) then deploys Firebase Hosting.
# Add repo secret FIREBASE_SERVICE_ACCOUNT_FLUXYV3_PROD: Firebase Console →
# Project settings → Service accounts → Generate new private key → paste JSON.
name: Deploy Firebase Hosting
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Client/package-lock.json
      - name: Install and build client
        run: |
          cd Client
          npm ci
          npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLUXYV3_PROD }}
          channelId: live
          projectId: fluxyv3-prod

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reflex Tap</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0a1a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    h1 { font-size: 1rem; font-weight: 600; color: #e879f9; margin: 0; }
    #board {
      position: relative;
      width: min(360px, 92vw);
      height: 280px;
      border: 2px solid #d946ef;
      border-radius: 12px;
      background: #0f172a;
      box-shadow: 0 0 28px rgba(217, 70, 239, 0.2);
      overflow: hidden;
    }
    .target {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22d3ee, #d946ef);
      cursor: pointer;
      box-shadow: 0 0 16px rgba(34, 211, 238, 0.5);
      border: none;
      padding: 0;
    }
    #score {
      font-size: 14px;
      color: #94a3b8;
    }
    p { font-size: 12px; color: #64748b; margin: 0; }
  </style>
</head>
<body>
  <h1>Reflex Tap</h1>
  <div id="board"></div>
  <div id="score">Hits: 0</div>
  <p>Tap the glowing orbs before they fade.</p>
  <script>
    const board = document.getElementById('board');
    const scoreEl = document.getElementById('score');
    let score = 0;
    let active = null;
    function spawn() {
      if (active) {
        active.remove();
        active = null;
      }
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'target';
      b.setAttribute('aria-label', 'Tap target');
      const maxX = board.clientWidth - 52;
      const maxY = board.clientHeight - 52;
      b.style.left = 8 + Math.random() * maxX + 'px';
      b.style.top = 8 + Math.random() * maxY + 'px';
      b.addEventListener('click', () => {
        score += 1;
        scoreEl.textContent = 'Hits: ' + score;
        spawn();
      });
      board.appendChild(b);
      active = b;
      setTimeout(() => {
        if (active === b) spawn();
      }, 1200);
    }
    spawn();
  </script>
</body>
</html>
